# # # # # # # # # # # # # # # # psmux
# SHIVA's psmux config (Windows)
# Ported from linux/tmux/tmux.conf
#
# NOTE: Minimal starting point. Building up
#   incrementally from the linux tmux config.
#
# All Rights Reserved
# # # # # # # # # # # # # # # #

# Shell (psmux defaults to pwsh, which is what we want)
# set -g default-shell pwsh

# Fix session name being truncated
set -g status-left-length 100

#### Action key
# Unbind the default prefix
unbind C-b
# Set C-t as the primary prefix
set-option -g prefix C-t
# Add C-b as a secondary prefix
set-option -g prefix2 C-b
# Make sure both keys send the prefix
bind C-t send-prefix
bind C-b send-prefix
set-option -g repeat-time 0
set-option -g focus-events on

## Resize mode Pane
# First, create a new resize mode
bind-key r switch-client -T resize
# Resize bindings that remain in resize mode
bind-key -T resize h resize-pane -L 2\; switch-client -T resize
bind-key -T resize j resize-pane -D 2\; switch-client -T resize
bind-key -T resize k resize-pane -U 2\; switch-client -T resize
bind-key -T resize l resize-pane -R 2\; switch-client -T resize
# Escape to exit resize mode
bind-key -T resize Escape switch-client -T root

## Reload Config
bind . source-file ~/.psmux.conf \; display-message "Config reloaded!"

## Split Panes (same bindings as linux config)
bind "'" split-window -v -c "#{pane_current_path}"
bind '"' split-window -h -c "#{pane_current_path}"

## Copy Mode
set-window-option -g mode-keys vi
bind Enter copy-mode

## Navigate Windows
bind -n M-] next-window
bind -n M-[ previous-window

## Pane Navigation (no prefix)
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

## Sessions
# NOTE: psmux doesn't have choose-session or command-prompt
# using choose-tree instead, and new-session without interactive prompt
unbind C-o
bind -n C-o choose-tree
bind C-n new-session
bind C-k confirm kill-session
# bind m - needs command-prompt for rename (not available in psmux yet)

## MISC
set -g cursor-style block
set -g cursor-blink off
set -g mouse on
set -g renumber-windows on       # renumber all windows when any window is closed
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size

bind-key -n C-z resize-pane -Z

## Pane Border Styling
set -g pane-border-style 'fg=#9893a5'
set -g pane-active-border-style 'fg=#C65305'

# :::: Status-Line :::::
set-option -g status-style bg=#11111b
set -g status-left " #[fg=colour8]{#S}  "
set -g status-right "#{?client_prefix, #S,} #[fg=color248]#H  "

# Window tab styling
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g window-status-format "#[fg=colour8] #{b:pane_current_path}#{?window_zoomed_flag, ,}"
set -g window-status-current-format "#[fg=#DA3B01,bold] #{b:pane_current_path}#{?window_zoomed_flag, ,}"

# Mark pane for builds
bind h run-shell 'tmux select-pane -m -T "build"'

# ===========================================
# Plugins
# ===========================================
set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-resurrect'

# Initialize PPM (keep at the very bottom)
run '~/.psmux/plugins/ppm/ppm.ps1'
