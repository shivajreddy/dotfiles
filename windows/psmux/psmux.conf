# # # # # # # # # # # # # # # # psmux
# SHIVA's psmux config (Windows)
# # # # # # # # # # # # # # # #

#### Prefix
unbind C-b
set-option -g prefix C-t
set-option -g prefix2 C-b
bind C-t send-prefix
bind C-b send-prefix

#### Split Panes
bind "'" split-window -v -c "#{pane_current_path}"
bind '"' split-window -h -c "#{pane_current_path}"

#### Pane Navigation (no prefix)
# C-h (Backspace) and C-j (Enter) are swallowed by ConPTY — CSI-u sequences
# are too. Alacritty remaps them to ESC-prefix (M-h/j) which passes through.
# C-k and C-l are unaffected control chars and work directly.
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

#### Pane Zoom
bind-key -n C-z resize-pane -Z

#### Navigate Windows
# Alacritty maps Ctrl+Tab -> ESC ] and Ctrl+Shift+Tab -> ESC [ (Alt+] / Alt+[)
# because ConPTY swallows modifyOtherKeys sequences (\u001b[27;5;9~ etc.)
# but passes Alt/ESC-prefix sequences through fine.
bind -n M-] next-window
bind -n M-[ previous-window
bind -n M-t new-window -c "#{pane_current_path}"

#### Sessions
unbind C-o
bind -n C-o choose-tree
bind C-n new-session
bind C-k confirm kill-session

#### Copy Mode
set-window-option -g mode-keys vi
bind Enter copy-mode

#### Misc
set -g mouse on
set -g renumber-windows on
set -g base-index 1
set -g escape-time 0
set -g history-limit 1000000
set -g status-left-length 100
set -g cursor-style block
set -g cursor-blink off

#### Pane Border Styling
set -g pane-border-style 'fg=#9893a5'
set -g pane-active-border-style 'fg=#C65305'

#### Status Line
set-option -g status-style bg=#11111b
set -g status-left " #[fg=colour8]{#S}  "
set -g status-right "#{?client_prefix, #S,} #[fg=color248]#H  "

#### Window Tab Styling
set -g automatic-rename on
set -g window-status-format "#[fg=colour8] #{b:pane_current_path}#{?window_zoomed_flag, ,}"
set -g window-status-current-format "#[fg=#DA3B01,bold] #{b:pane_current_path}#{?window_zoomed_flag, ,}"

#### Reload Config
bind . source-file ~/.psmux.conf \; display-message "Config reloaded!"

#### Plugins
set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-resurrect'
run '~/.psmux/plugins/ppm/ppm.ps1'
